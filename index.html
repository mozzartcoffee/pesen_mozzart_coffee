<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozzart Coffee Digital Order</title>
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Konfigurasi Tailwind untuk Font & Warna Custom -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        mozzart: {
                            dark: '#1A110A',     // Deep Espresso
                            gold: '#C5A059',     // Classic Gold
                            goldHover: '#B08D4B',// Darker Gold
                            cream: '#FAF8F5',    // Latte Milk
                            paper: '#F0EBE1',    // Vintage Paper
                            border: '#E6DFD3',   // Soft Border
                            muted: '#8C7F70'     // Muted Text
                        }
                    },
                    boxShadow: {
                        'elegant': '0 10px 40px -10px rgba(26, 17, 10, 0.08)',
                        'elegant-hover': '0 20px 40px -10px rgba(197, 160, 89, 0.15)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Animasi sederhana */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Custom Scrollbar for elegant look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #FAF8F5; }
        ::-webkit-scrollbar-thumb { background: #E6DFD3; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #C5A059; }

        /* Pengaturan Khusus untuk Cetak (Print) */
        @media print {
            body * { visibility: hidden; }
            #recap-section, #recap-section * { visibility: visible; }
            #recap-section {
                position: absolute; left: 0; top: 0; width: 100%;
                margin: 0; padding: 0; box-shadow: none; border: none;
            }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-mozzart-cream text-mozzart-dark font-sans pb-24 lg:pb-0 selection:bg-mozzart-gold selection:text-white">

    <!-- Container Utama Aplikasi -->
    <div id="app"></div>

    <!-- Gunakan module untuk import Supabase -->
    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

        // --- 1. SETUP ICON ---
        window.icons = {
            coffee: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v2"/><path d="M14 2v2"/><path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a4 4 0 1 1 0 8h-1"/><path d="M6 2v2"/></svg>`,
            package: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-mozzart-gold"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>`,
            cart: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-mozzart-gold"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>`,
            trash: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>`,
            chevronRight: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`,
            creditCard: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>`,
            info: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-mozzart-gold shrink-0 mt-1"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`,
            checkCircle: `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>`,
            printer: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>`,
            musicNote: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`
        };

        // --- 2. STATE APLIKASI (Data Default) ---
        window.getTomorrowDate = function() {
            const tmr = new Date();
            tmr.setDate(tmr.getDate() + 1);
            return tmr.toISOString().split('T')[0];
        }

        window.menuItems = [
            { id: 1, name: "Mozzart Signature Cold Brew", price: 35000, stock: 12, category: "Coffee", image: "☕", desc: "Cold brew signature dengan sentuhan rahasia Mozzart." },
            { id: 2, name: "Classic Caffe Latte", price: 28000, stock: 20, category: "Coffee", image: "🥛", desc: "Perpaduan espresso dan susu segar yang lembut." },
            { id: 3, name: "Velvet Espresso", price: 22000, stock: 35, category: "Coffee", image: "⚡", desc: "Espresso murni dengan crema yang tebal." },
            { id: 4, name: "Caramel Macchiato", price: 32000, stock: 5, category: "Coffee", image: "🍯", desc: "Manisnya karamel berpadu dengan kopi yang pekat." },
            { id: 5, name: "Croissant Almond", price: 25000, stock: 8, category: "Pastry", image: "🥐", desc: "Croissant renyah dengan isian dan taburan almond." },
            { id: 6, name: "Matcha Zen Latte", price: 30000, stock: 15, category: "Non-Coffee", image: "🌿", desc: "Matcha premium khas Jepang yang menenangkan." },
        ];
        
        window.cart = [];
        window.view = 'landing';
        window.paymentMethod = 'qris';
        window.orderType = 'instant';
        window.preorderDate = window.getTomorrowDate();
        window.orderDetail = null;
        window.orders = []; 

        window.buyerName = ''; 
        window.buyerAddress = '';
        window.deliveryTime = '';

        window.appLogoUrl = ''; 
        window.adminWa = '6281234567890';
        window.adminUser = 'admin'; 
        window.adminPass = 'admin123'; 
        window.aboutText = 'Di Mozzart Coffee, kami percaya bahwa menyeduh kopi adalah sebuah seni layaknya menggubah sebuah simfoni. Kami menggunakan biji kopi pilihan terbaik untuk menghadirkan harmoni rasa yang sempurna di setiap tegukannya.';
        window.instantText = 'Kopi akan segera dibuat dan dikirimkan setelah pembayaran sukses (selama stok produk ready).';
        window.poText = 'Solusi untuk pemesanan esok hari atau dalam jumlah besar. Wajib order minimal H-1.';
        window.editingMenuId = null;
        window.isAddingMenu = false; 
        
        window.adminFilterDate = ''; 

        // --- FUNGSI BANTUAN: UPLOAD GAMBAR ---
        window.fileToBase64 = function(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        };

        // --- 3. INIT CLOUD DATABASE (SUPABASE) ---
        const SUPABASE_URL = 'https://qystpyfjpuhvljowgaui.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5c3RweWZqcHVodmxqb3dnYXVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTY0NDMsImV4cCI6MjA5NDEzMjQ0M30.DYXRBYdpQcP0fosMtzw1RlQdAGJlEJrtcLx3W5Ac45M';
        
        let supabase = null;
        try {
            if (SUPABASE_URL !== 'MASUKKAN_URL_SUPABASE_ANDA_DISINI') {
                supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else {
                console.warn("⚠️ Supabase belum dikonfigurasi. Menggunakan mode lokal sementara.");
            }
        } catch (error) {
            console.error("Gagal inisialisasi Supabase:", error);
        }

        async function initSupabaseData() {
            if (!supabase) return;
            try {
                const { data: menuData } = await supabase.from('menu').select('*').order('id', { ascending: true });
                if (menuData && menuData.length > 0) {
                    window.menuItems = menuData;
                    window.render();
                } else if (menuData && menuData.length === 0) {
                    await supabase.from('menu').insert(window.menuItems);
                }

                const { data: settingData } = await supabase.from('settings').select('*').eq('id', 'store_settings').single();
                if (settingData) {
                    window.appLogoUrl = settingData.logo || '';
                    window.adminWa = settingData.wa || window.adminWa;
                    window.adminUser = settingData.admin_user || window.adminUser;
                    window.adminPass = settingData.admin_pass || window.adminPass;
                    window.aboutText = settingData.about || window.aboutText;
                    window.instantText = settingData.instant || window.instantText;
                    window.poText = settingData.po || window.poText;
                    window.render();
                }

                const { data: orderData } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
                if (orderData) {
                    window.orders = orderData;
                }

                setInterval(async () => {
                    try {
                        let isDataChanged = false;
                        const { data: menuData } = await supabase.from('menu').select('*').order('id', { ascending: true });
                        const { data: settingData } = await supabase.from('settings').select('*').eq('id', 'store_settings').single();
                        
                        if (settingData) {
                            if (window.appLogoUrl !== (settingData.logo || '') || window.adminWa !== (settingData.wa || window.adminWa) ||
                                window.adminUser !== (settingData.admin_user || window.adminUser) || window.adminPass !== (settingData.admin_pass || window.adminPass) ||
                                window.aboutText !== (settingData.about || window.aboutText) || window.instantText !== (settingData.instant || window.instantText) ||
                                window.poText !== (settingData.po || window.poText)) {
                                
                                window.appLogoUrl = settingData.logo || ''; window.adminWa = settingData.wa || window.adminWa;
                                window.adminUser = settingData.admin_user || window.adminUser; window.adminPass = settingData.admin_pass || window.adminPass;
                                window.aboutText = settingData.about || window.aboutText; window.instantText = settingData.instant || window.instantText;
                                window.poText = settingData.po || window.poText;
                                isDataChanged = true;
                            }
                        }

                        const { data: newOrderData } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
                        if (newOrderData && JSON.stringify(newOrderData) !== JSON.stringify(window.orders)) {
                            window.orders = newOrderData;
                            isDataChanged = true;
                        }
                        
                        if (isDataChanged && (['landing', 'about', 'menu', 'success'].includes(window.view) || (window.view === 'admin' && !window.editingMenuId))) {
                            window.render();
                        }
                    } catch (err) {}
                }, 5000); 
            } catch (error) { console.error("Error fetching data:", error); }
        }

        initSupabaseData();

        // --- 4. FUNGSI LOGIKA APLIKASI ---
        window.formatRupiah = function(angka) { return 'Rp ' + parseInt(angka).toLocaleString('id-ID'); }
        window.getTotalHarga = function() { return window.cart.reduce((acc, item) => acc + (item.price * item.quantity), 0); }
        window.getTotalItem = function() { return window.cart.reduce((acc, item) => acc + item.quantity, 0); }
        window.setView = function(newView) { window.view = newView; window.render(); window.scrollTo(0, 0); };

        window.handleBuyerLogin = function(e) {
            e.preventDefault();
            const nameInput = document.getElementById('loginBuyerName').value;
            if (nameInput.trim() !== '') { window.buyerName = nameInput; window.setView('about'); }
        };

        window.logoutBuyer = function() { window.buyerName = ''; window.setView('landing'); };

        window.handleAdminLogin = function(e) {
            e.preventDefault();
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            if (user === window.adminUser && pass === window.adminPass) { window.setView('admin'); } 
            else { alert('Username atau Password salah!'); }
        };

        window.saveAdminSettings = async function(e) {
            e.preventDefault();
            const newWa = document.getElementById('setWa').value;
            const newAbout = document.getElementById('setAbout').value;
            const newInstant = document.getElementById('setInstant').value;
            const newPo = document.getElementById('setPo').value;
            const newUser = document.getElementById('setAdminUser').value;
            const newPass = document.getElementById('setAdminPass').value;
            
            const fileInput = document.getElementById('setLogoFile');
            let newLogo = window.appLogoUrl; 
            
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 2000000) return alert('Ukuran file logo maksimal 2MB!');
                newLogo = await window.fileToBase64(file);
            }

            try {
                if(supabase) {
                    const { error } = await supabase.from('settings').upsert({
                        id: 'store_settings', wa: newWa, about: newAbout, instant: newInstant, po: newPo, logo: newLogo,
                        admin_user: newUser, admin_pass: newPass
                    });
                    if (error) throw error;
                    alert('Pengaturan berhasil disimpan!');
                } else {
                    window.appLogoUrl = newLogo; window.adminWa = newWa; window.adminUser = newUser; window.adminPass = newPass;
                    window.aboutText = newAbout; window.instantText = newInstant; window.poText = newPo;
                    alert('Tersimpan di memori lokal.'); window.render();
                }
            } catch (err) { alert('Gagal menyimpan: ' + err.message); }
        };

        window.editMenu = function(id) { window.editingMenuId = id; window.isAddingMenu = false; window.render(); };
        window.cancelEditMenu = function() { window.editingMenuId = null; window.render(); };

        window.saveMenu = async function(id) {
            const name = document.getElementById(`edit-name-${id}`).value;
            const price = parseInt(document.getElementById(`edit-price-${id}`).value);
            const stock = parseInt(document.getElementById(`edit-stock-${id}`).value);
            const desc = document.getElementById(`edit-desc-${id}`).value;
            const category = document.getElementById(`edit-category-${id}`).value;
            const existingItem = window.menuItems.find(i => i.id === id);
            
            const fileInput = document.getElementById(`edit-image-file-${id}`);
            let image = existingItem.image; 
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 2000000) return alert('Ukuran gambar maksimal 2MB!');
                image = await window.fileToBase64(file);
            }

            try {
                if(supabase) {
                    const { error } = await supabase.from('menu').upsert({ id: Number(id), name, price, stock, image, desc, category: category });
                    if (error) throw error;
                    window.cancelEditMenu();
                } else {
                    if(existingItem) { existingItem.name = name; existingItem.price = price; existingItem.stock = stock; existingItem.image = image; existingItem.desc = desc; existingItem.category = category; }
                    window.cancelEditMenu();
                }
            } catch (err) { alert('Gagal menyimpan menu: ' + err.message); }
        };

        window.toggleAddMenu = function() { window.isAddingMenu = !window.isAddingMenu; window.editingMenuId = null; window.render(); };

        window.saveNewMenu = async function() {
            const name = document.getElementById('add-name').value;
            const price = parseInt(document.getElementById('add-price').value);
            const stock = parseInt(document.getElementById('add-stock').value);
            const desc = document.getElementById('add-desc').value;
            const category = document.getElementById('add-category').value;
            
            if (!name || isNaN(price) || isNaN(stock)) return alert('Mohon lengkapi Nama, Harga, dan Stok!');
            const fileInput = document.getElementById('add-image-file');
            let image = '☕'; 
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 2000000) return alert('Ukuran gambar maksimal 2MB!');
                image = await window.fileToBase64(file);
            }

            const newId = window.menuItems.length > 0 ? Math.max(...window.menuItems.map(i => i.id)) + 1 : 1;
            const newItem = { id: newId, name, price, stock, image, desc, category };

            try {
                if(supabase) {
                    const { error } = await supabase.from('menu').insert([newItem]);
                    if (error) throw error;
                    window.toggleAddMenu();
                } else {
                    window.menuItems.push(newItem); window.toggleAddMenu();
                }
                alert('Produk berhasil ditambahkan!');
            } catch (err) { alert('Gagal menambah menu baru: ' + err.message); }
        };

        window.setAdminFilterDate = function(e) { window.adminFilterDate = e.target.value; window.render(); };
        window.printRekap = function() { window.print(); };

        window.deleteOrder = async function(orderId) {
            if (!confirm('Apakah Anda yakin ingin menghapus pesanan ini? Aksi ini tidak bisa dibatalkan.')) return;
            try {
                if (supabase) {
                    const { data, error } = await supabase.from('orders').delete().eq('id', orderId).select();
                    if (error) throw error;
                    if (!data || data.length === 0) throw new Error("Akses ditolak oleh Supabase. Pastikan RLS Policy (Enable Delete) untuk tabel 'orders' sudah dibuat.");
                }
                window.orders = window.orders.filter(order => order.id !== orderId);
                window.render();
            } catch (err) { alert('Gagal menghapus pesanan: ' + err.message); }
        };

        window.resetOrders = async function() {
            const msg = window.adminFilterDate ? `Hapus SEMUA pesanan tanggal ${window.adminFilterDate}?` : `Hapus SEMUA riwayat pesanan permanen?`;
            if (!confirm(msg)) return;
            try {
                if (supabase) {
                    if (window.adminFilterDate) {
                        const idsToDelete = window.orders.filter(order => {
                            const localDate = new Date(new Date(order.created_at) - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
                            return localDate === window.adminFilterDate;
                        }).map(o => o.id);
                        if (idsToDelete.length > 0) {
                            const { data, error } = await supabase.from('orders').delete().in('id', idsToDelete).select();
                            if (error) throw error;
                            if (!data || data.length === 0) throw new Error("Akses ditolak oleh Supabase.");
                        }
                    } else {
                        const { data, error } = await supabase.from('orders').delete().neq('id', 'DUMMY_RESET_ID').select();
                        if (error) throw error;
                        if (window.orders.length > 0 && (!data || data.length === 0)) throw new Error("Akses ditolak oleh Supabase.");
                    }
                }
                if (window.adminFilterDate) {
                    window.orders = window.orders.filter(order => {
                        const localDate = new Date(new Date(order.created_at) - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
                        return localDate !== window.adminFilterDate;
                    });
                } else { window.orders = []; }
                alert('Data pesanan berhasil direset!'); window.render();
            } catch (err) { alert('Gagal mereset data: ' + err.message); }
        };

        window.setPaymentMethod = function(method) { window.paymentMethod = method; window.render(); };
        window.setOrderType = function(type) { window.orderType = type; window.render(); };
        window.setPreorderDate = function(event) { window.preorderDate = event.target.value; window.render(); };

        window.checkIfCartHasPO = function() {
            return window.cart.some(cartItem => {
                const originalMenu = window.menuItems.find(m => m.id === cartItem.id);
                return !originalMenu || originalMenu.stock < cartItem.quantity;
            });
        };

        window.addToCart = function(id) {
            const itemMenu = window.menuItems.find(i => i.id === id);
            if (!itemMenu) return;
            const existingItem = window.cart.find(i => i.id === id);
            if (existingItem) { existingItem.quantity += 1; } else { window.cart.push({ ...itemMenu, quantity: 1 }); }
            window.render();
        };

        window.removeFromCart = function(id) {
            const index = window.cart.findIndex(i => i.id === id);
            if (index !== -1) {
                if (window.cart[index].quantity === 1) { window.cart.splice(index, 1); } 
                else { window.cart[index].quantity -= 1; }
            }
            window.render();
        };

        window.handleCheckout = async function() {
            window.buyerAddress = document.getElementById('inputAddress').value;
            window.deliveryTime = document.getElementById('inputTime').value;

            if (window.cart.length === 0) return alert('Keranjang kosong!');
            if (!window.buyerAddress.trim() || !window.deliveryTime) return alert('Mohon lengkapi alamat dan jam pengiriman!');
            
            if (window.orderType === 'instant') {
                for (const cartItem of window.cart) {
                    const itemMenu = window.menuItems.find(i => i.id === cartItem.id);
                    if (itemMenu) {
                        const newStock = Math.max(0, itemMenu.stock - cartItem.quantity);
                        if(supabase) { await supabase.from('menu').update({ stock: newStock }).eq('id', itemMenu.id); } 
                        else { itemMenu.stock = newStock; }
                    }
                }
            }
            
            window.orderDetail = {
                items: [...window.cart], total: window.getTotalHarga(), id: "MZZ-" + Math.floor(Math.random() * 1000000),
                time: new Date().toLocaleTimeString('id-ID'), type: window.orderType,
                date: window.orderType === 'preorder' ? window.preorderDate : 'Hari Ini',
                address: window.buyerAddress, deliveryTime: window.deliveryTime
            };

            const dbOrderRecord = {

                            </div>
                            <button onclick="handleCheckout()" class="w-full bg-mozzart-gold text-white py-4 rounded-xl font-bold text-lg hover:bg-mozzart-goldHover transition-all flex justify-center items-center gap-2 tracking-wide">
                                Konfirmasi & Pesan
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.renderSuccessView = function() {
            if (!window.orderDetail) return '';

            const itemsHtml = window.orderDetail.items.map(item => `
                <div class="flex justify-between text-sm py-2 border-b border-mozzart-border/30 last:border-0">
                    <span class="text-mozzart-dark"><span class="font-bold text-mozzart-gold">${item.quantity}x</span> ${item.name}</span>
                    <span class="font-medium text-mozzart-dark">${window.formatRupiah(item.price * item.quantity)}</span>
                </div>
            `).join('');

            return `
                <div class="max-w-xl mx-auto text-center py-12 md:py-20 animate-fade-in">
                    <div class="bg-mozzart-dark text-mozzart-gold w-28 h-28 rounded-full flex items-center justify-center mx-auto mb-8 shadow-elegant">
                        <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
                    </div>
                    <h2 class="text-4xl font-bold mb-3 italic font-serif text-mozzart-dark">Pesanan Tercatat</h2>
                    <p class="text-mozzart-muted mb-10 px-4 text-base">
                        Silakan hubungi Admin via WhatsApp untuk mengonfirmasi pesanan dan mendapatkan instruksi pembayaran.
                    </p>
                    
                    <div class="bg-white p-8 rounded-[2rem] border border-mozzart-border text-left shadow-elegant mb-10 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-mozzart-gold"></div>
                        <div class="flex justify-between border-b border-mozzart-border pb-4 mb-5 mt-2">
                            <span class="text-xs text-mozzart-muted uppercase tracking-widest font-semibold">Order ID</span>
                            <span class="text-sm font-mono font-bold text-mozzart-dark">${window.orderDetail.id}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-y-5 gap-x-6 border-b border-mozzart-border pb-6 mb-6 text-sm">
                            <div>
                                <p class="text-[10px] text-mozzart-muted uppercase tracking-wider mb-1 font-semibold">Penerima</p>
                                <p class="font-bold text-mozzart-dark text-base">${window.buyerName}</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-mozzart-muted uppercase tracking-wider mb-1 font-semibold">Pengiriman</p>
                                <p class="font-bold text-mozzart-gold">${window.orderDetail.type === 'instant' ? 'Instan' : 'PO: ' + window.orderDetail.date}</p>
                            </div>
                            <div class="col-span-2">
                                <p class="text-[10px] text-mozzart-muted uppercase tracking-wider mb-1 font-semibold">Alamat</p>
                                <p class="font-medium text-mozzart-dark leading-relaxed">${window.orderDetail.address}</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-mozzart-muted uppercase tracking-wider mb-1 font-semibold">Target Tiba</p>
                                <p class="font-medium text-mozzart-dark">${window.orderDetail.deliveryTime} WIB</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-mozzart-muted uppercase tracking-wider mb-1 font-semibold">Metode</p>
                                <p class="font-bold text-mozzart-dark uppercase">${window.paymentMethod}</p>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <p class="text-[10px] text-mozzart-muted uppercase tracking-wider mb-3 font-semibold">Ringkasan Pesanan</p>
                            <div class="bg-mozzart-cream rounded-xl p-4 border border-mozzart-border/50">
                                ${itemsHtml}
                            </div>
                        </div>
                        <div class="flex justify-between items-end pt-2">
                            <span class="text-sm font-semibold text-mozzart-muted uppercase tracking-wider">Total</span>
                            <span class="text-2xl font-bold font-serif italic text-mozzart-dark">${window.formatRupiah(window.orderDetail.total)}</span>
                        </div>
                    </div>

                    <a href="${window.generateWALink()}" target="_blank" class="w-full bg-[#25D366] hover:bg-[#1DA851] text-white font-bold py-4 rounded-xl transition-all shadow-lg mb-6 flex items-center justify-center gap-3 text-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 1.828 6.362L0 24l5.807-1.802A12 12 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 11.944 0zm.056 21.841c-1.865 0-3.665-.487-5.263-1.42l-.377-.22-3.87 1.202 1.222-3.72-.244-.383A9.8 9.8 0 0 1 2.158 12C2.158 6.561 6.593 2.159 12 2.159 17.407 2.159 21.842 6.56 21.842 12s-4.435 9.841-9.842 9.841zm5.35-7.235c-.292-.146-1.74-.86-2.01-.957-.27-.098-.466-.146-.66.146-.196.293-.76 1.01-.93 1.218-.173.208-.346.233-.64.086-2.02-1.01-3.32-2.193-4.59-4.394-.173-.302-.016-.464.128-.61.13-.135.293-.34.44-.51.146-.17.195-.292.293-.487.098-.195.05-.366-.024-.512-.073-.146-.66-1.585-.904-2.17-.235-.57-.478-.493-.66-.502l-.56-.01c-.195 0-.512.073-.78.366-.268.292-1.025.998-1.025 2.43 0 1.433 1.05 2.818 1.196 3.013.146.195 2.05 3.12 4.962 4.38 1.93.834 2.65.952 3.61.802.816-.128 2.535-1.037 2.89-2.038.353-1.002.353-1.86.246-2.038-.106-.18-.39-.283-.683-.43z"/></svg>
                        Konfirmasi via WhatsApp
                    </a>

                    <button onclick="setView('landing')" class="text-mozzart-muted font-medium hover:text-mozzart-dark transition text-sm uppercase tracking-wider">
                        Kembali ke Halaman Utama
                    </button>
                </div>
            `;
        }

        window.renderMobileCart = function() {
            if (window.view !== 'menu' || window.cart.length === 0) return '';
            
            return `
                <div class="lg:hidden fixed bottom-6 left-4 right-4 z-40 animate-fade-in no-print">
                    <button onclick="setView('checkout')" class="w-full bg-mozzart-dark text-white p-4 rounded-[1.5rem] flex justify-between items-center shadow-elegant active:scale-95 transition-all border border-mozzart-gold/20">
                        <div class="flex items-center gap-4">
                            <div class="bg-mozzart-gold w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold shadow-inner">
                                ${window.getTotalItem()}
                            </div>
                            <span class="font-semibold tracking-wide">Checkout</span>
                        </div>
                        <span class="font-bold text-xl text-mozzart-gold pr-2 font-serif italic">${window.formatRupiah(window.getTotalHarga())}</span>
                    </button>
                </div>
            `;
        }

        window.render = function() {
            const appContainer = document.getElementById('app');
            
            let mainContent = '';
            if (window.view === 'landing') mainContent = window.renderLandingView();
            else if (window.view === 'loginBuyer') mainContent = window.renderLoginBuyerView();
            else if (window.view === 'loginAdmin') mainContent = window.renderLoginAdminView();
            else if (window.view === 'admin') mainContent = window.renderAdminDashboard();
            else if (window.view === 'about') mainContent = window.renderAboutView();
            else if (window.view === 'menu') mainContent = window.renderMenuView();
            else if (window.view === 'checkout') mainContent = window.renderCheckoutView();
            else if (window.view === 'success') mainContent = window.renderSuccessView();

            const hideHeader = ['landing', 'loginBuyer', 'loginAdmin', 'admin'].includes(window.view);

            if (hideHeader) {
                appContainer.innerHTML = mainContent;
            } else {
                appContainer.innerHTML = `
                    ${window.renderHeader()}
                    <main class="max-w-6xl mx-auto p-4 md:p-8">
                        ${mainContent}
                    </main>
                    ${window.renderMobileCart()}
                    <footer class="mt-16 py-10 bg-mozzart-dark border-t-4 border-mozzart-gold text-center text-mozzart-muted text-xs no-print font-sans">
                        <div class="text-mozzart-gold mb-3 flex justify-center">${window.icons.musicNote}</div>
                        <p class="uppercase tracking-widest">&copy; 2026 Mozzart Coffee.</p>
                        <p class="mt-2 opacity-70 italic font-serif">A Symphony in Every Bottle.</p>
                    </footer>
                `;
            }
            
            if (window.view === 'admin') {
                const printFooter = document.getElementById('print-footer');
                if (printFooter) {
                    window.addEventListener('beforeprint', () => { printFooter.style.display = 'block'; });
                    window.addEventListener('afterprint', () => { printFooter.style.display = 'none'; });
                }
            }
        }

        window.render();
    </script>
</body>
</html>
