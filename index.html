<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozzart Coffee Digital Order</title>
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }

    <style>
        /* Animasi sederhana */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Pengaturan Khusus untuk Cetak (Print) */
        @media print {
            body * {
                visibility: hidden;
            }
            #recap-section, #recap-section * {
                visibility: visible;
            }
            #recap-section {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
                box-shadow: none;
                border: none;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

    <!-- Gunakan module untuk import Supabase -->
    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

        // --- 1. SETUP ICON ---

            info: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-600 shrink-0 mt-1"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`,
            checkCircle: `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>`,

            tmr.setDate(tmr.getDate() + 1);

        }

        window.menuItems = [
            { id: 1, name: "Mozzart Signature Cold Brew", price: 35000, stock: 12, category: "Coffee", image: "☕", desc: "Cold brew signature dengan sentuhan rahasia Mozzart." },
            { id: 2, name: "Classic Caffe Latte", price: 28000, stock: 20, category: "Coffee", image: "🥛", desc: "Perpaduan espresso dan susu segar yang lembut." },
            { id: 3, name: "Velvet Espresso", price: 22000, stock: 35, category: "Coffee", image: "⚡", desc: "Espresso murni dengan crema yang tebal." },
            { id: 4, name: "Caramel Macchiato", price: 32000, stock: 5, category: "Coffee", image: "🍯", desc: "Manisnya karamel berpadu dengan kopi yang pekat." },
            { id: 5, name: "Croissant Almond", price: 25000, stock: 8, category: "Pastry", image: "🥐", desc: "Croissant renyah dengan isian dan taburan almond." },
            { id: 6, name: "Matcha Zen Latte", price: 30000, stock: 15, category: "Non-Coffee", image: "🌿", desc: "Matcha premium khas Jepang yang menenangkan." },
        ];
        
        window.cart = [];
        window.view = 'landing';
        window.paymentMethod = 'qris';
        window.orderType = 'instant';
        window.preorderDate = window.getTomorrowDate();
        window.orderDetail = null;
        window.orders = []; // Menyimpan rekap pesanan dari database

        window.buyerName = ''; 
        window.buyerAddress = '';
        window.deliveryTime = '';

        window.appLogoUrl = ''; // State untuk URL Logo kustom
        window.adminWa = '6281234567890';
        window.adminUser = 'admin'; // Kredensial default
        window.adminPass = 'admin123'; // Kredensial default
        window.aboutText = 'Di Mozzart Coffee, kami percaya bahwa menyeduh kopi adalah sebuah seni layaknya menggubah sebuah simfoni. Kami menggunakan biji kopi pilihan terbaik untuk menghadirkan harmoni rasa yang sempurna di setiap tegukannya.';

        window.adminFilterDate = ''; 

        // --- FUNGSI BANTUAN: UPLOAD GAMBAR ---
        window.fileToBase64 = function(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        };

        // --- 3. INIT CLOUD DATABASE (SUPABASE) ---
        // PENTING: Ganti URL dan KEY di bawah ini dengan milik Supabase Anda!
        const SUPABASE_URL = 'https://qystpyfjpuhvljowgaui.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5c3RweWZqcHVodmxqb3dnYXVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTY0NDMsImV4cCI6MjA5NDEzMjQ0M30.DYXRBYdpQcP0fosMtzw1RlQdAGJlEJrtcLx3W5Ac45M';
        
        let supabase = null;
        try {
            if (SUPABASE_URL !== 'MASUKKAN_URL_SUPABASE_ANDA_DISINI') {
                supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else {
                console.warn("⚠️ Supabase belum dikonfigurasi. Menggunakan mode lokal sementara.");
            }
        } catch (error) {
            console.error("Gagal inisialisasi Supabase:", error);
        }

        async function initSupabaseData() {
            if (!supabase) return;

            try {
                // 1. Sinkronisasi Data Menu
                const { data: menuData, error: menuErr } = await supabase.from('menu').select('*').order('id', { ascending: true });
                
                if (menuData && menuData.length > 0) {
                    window.menuItems = menuData;
                    window.render();
                } else if (menuData && menuData.length === 0) {
                    await supabase.from('menu').insert(window.menuItems);
                }

                // 2. Sinkronisasi Pengaturan Admin (Logo, WA, dll)
                const { data: settingData, error: settingErr } = await supabase.from('settings').select('*').eq('id', 'store_settings').single();
                if (settingData) {
                    window.appLogoUrl = settingData.logo || '';
                    window.adminWa = settingData.wa || window.adminWa;
                    window.adminUser = settingData.admin_user || window.adminUser;
                    window.adminPass = settingData.admin_pass || window.adminPass;
                    window.aboutText = settingData.about || window.aboutText;
                    window.instantText = settingData.instant || window.instantText;
                    window.poText = settingData.po || window.poText;
                    window.render();
                }

                // Ambil Data Rekap Pesanan
                const { data: orderData } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
                if (orderData) {
                    window.orders = orderData;
                }

                // 3. Fallback Realtime (Polling) karena WebSocket diblokir di Canvas
                setInterval(async () => {
                    try {
                        let isDataChanged = false;

                        const { data: menuData } = await supabase.from('menu').select('*').order('id', { ascending: true });
                        // Cek perubahan Settings
                        const { data: settingData } = await supabase.from('settings').select('*').eq('id', 'store_settings').single();
                        if (settingData) {
                            if (window.appLogoUrl !== (settingData.logo || '') ||
                                window.adminWa !== (settingData.wa || window.adminWa) ||
                                window.adminUser !== (settingData.admin_user || window.adminUser) ||
                                window.adminPass !== (settingData.admin_pass || window.adminPass) ||
                                window.aboutText !== (settingData.about || window.aboutText) ||
                                window.instantText !== (settingData.instant || window.instantText) ||
                                window.poText !== (settingData.po || window.poText)) {
                                
                                window.appLogoUrl = settingData.logo || '';
                                window.adminWa = settingData.wa || window.adminWa;
                                window.adminUser = settingData.admin_user || window.adminUser;
                                window.adminPass = settingData.admin_pass || window.adminPass;
                                window.aboutText = settingData.about || window.aboutText;
                                window.instantText = settingData.instant || window.instantText;
                                window.poText = settingData.po || window.poText;
                                isDataChanged = true;
                            }
                        }

                        const { data: newOrderData } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
                        if (newOrderData && JSON.stringify(newOrderData) !== JSON.stringify(window.orders)) {
                            window.orders = newOrderData;
                            isDataChanged = true;
                        }
                        
                        if (isDataChanged && (['landing', 'about', 'menu', 'success'].includes(window.view) || (window.view === 'admin' && !window.editingMenuId))) {
                            window.render();
                        }
                    } catch (err) {
                        // Abaikan error saat polling
                    }
                }, 5000); 

            } catch (error) {
                console.error("Error fetching data dari Supabase:", error);
            }
        }

        initSupabaseData();

        // --- 4. FUNGSI LOGIKA APLIKASI ---
        window.formatRupiah = function(angka) {
            return 'Rp ' + parseInt(angka).toLocaleString('id-ID');
        }

        window.getTotalHarga = function() {
            return window.cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
        }

        window.getTotalItem = function() {
            return window.cart.reduce((acc, item) => acc + item.quantity, 0);
        }

        window.setView = function(newView) {
            window.view = newView;
            window.render();
            window.scrollTo(0, 0);
        };

        window.handleBuyerLogin = function(e) {
            e.preventDefault();
            const nameInput = document.getElementById('loginBuyerName').value;
            if (nameInput.trim() !== '') {
                window.buyerName = nameInput;
                window.setView('about');
            }
        };

        window.logoutBuyer = function() {
            window.buyerName = '';
            window.setView('landing');
        };

        window.handleAdminLogin = function(e) {
            e.preventDefault();
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            // Memeriksa dengan kredensial dinamis dari database, bukan hardcoded
            if (user === window.adminUser && pass === window.adminPass) {
                window.setView('admin');
            } else {
                alert('Username atau Password salah!');
            }
        };

        window.saveAdminSettings = async function(e) {
            e.preventDefault();
            const newWa = document.getElementById('setWa').value;
            const newAbout = document.getElementById('setAbout').value;
            const newInstant = document.getElementById('setInstant').value;
            const newPo = document.getElementById('setPo').value;
            
            // Mengambil input kredensial baru
            const newUser = document.getElementById('setAdminUser').value;
            const newPass = document.getElementById('setAdminPass').value;
            
            const fileInput = document.getElementById('setLogoFile');
            let newLogo = window.appLogoUrl; 
            
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 2000000) return alert('Ukuran file logo maksimal 2MB!');
                newLogo = await window.fileToBase64(file);
            }

            try {
                if(supabase) {
                    const { error } = await supabase.from('settings').upsert({
                        id: 'store_settings',
                        wa: newWa, about: newAbout, instant: newInstant, po: newPo, logo: newLogo,
                        admin_user: newUser, admin_pass: newPass
                    });
                    if (error) throw error;
                    alert('Pengaturan berhasil disimpan ke Supabase Database!');
                } else {
                    window.appLogoUrl = newLogo;
                    window.adminWa = newWa;
                    window.adminUser = newUser;
                    window.adminPass = newPass;
                    window.aboutText = newAbout;
                    window.instantText = newInstant;
                    window.poText = newPo;
                    alert('Tersimpan di memori lokal (Supabase belum di-setup).');
                    window.render();
                }
            } catch (err) {
                alert('Gagal menyimpan: ' + err.message);
            }
        };

        window.editMenu = function(id) {
            window.editingMenuId = id;
            window.isAddingMenu = false; // Tutup form tambah jika sedang buka form edit
            window.render();
        };

        window.cancelEditMenu = function() {
            window.editingMenuId = null;
            window.render();
        };

        window.saveMenu = async function(id) {
            const name = document.getElementById(`edit-name-${id}`).value;
            const price = parseInt(document.getElementById(`edit-price-${id}`).value);
            const stock = parseInt(document.getElementById(`edit-stock-${id}`).value);
            const desc = document.getElementById(`edit-desc-${id}`).value;
            const category = document.getElementById(`edit-category-${id}`).value;

            const existingItem = window.menuItems.find(i => i.id === id);
            
            const fileInput = document.getElementById(`edit-image-file-${id}`);
            let image = existingItem.image; 
            
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 2000000) return alert('Ukuran gambar maksimal 2MB!');
                image = await window.fileToBase64(file);
            }

            try {
                if(supabase) {
                    const { error } = await supabase.from('menu').upsert({
                        id: Number(id), name, price, stock, image, desc, category: category
                    });
                    if (error) throw error;
                    window.cancelEditMenu();
                } else {
                    if(existingItem) {
                        existingItem.name = name; existingItem.price = price; 
                        existingItem.stock = stock; existingItem.image = image; existingItem.desc = desc; existingItem.category = category;
                    }
                    window.cancelEditMenu();
                }
            } catch (err) {
                alert('Gagal menyimpan menu: ' + err.message);
            }
        };

        // --- FITUR BARU: TAMBAH MENU ---
        window.toggleAddMenu = function() {
            window.isAddingMenu = !window.isAddingMenu;
            window.editingMenuId = null; // Tutup form edit jika sedang buka form tambah
            window.render();
        };

        window.saveNewMenu = async function() {
            const name = document.getElementById('add-name').value;
            const price = parseInt(document.getElementById('add-price').value);
            const stock = parseInt(document.getElementById('add-stock').value);
            const desc = document.getElementById('add-desc').value;
            const category = document.getElementById('add-category').value;
            
            if (!name || isNaN(price) || isNaN(stock)) return alert('Mohon lengkapi Nama, Harga, dan Stok!');

            const fileInput = document.getElementById('add-image-file');
            let image = '☕'; // Default icon jika tidak upload gambar
            
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 2000000) return alert('Ukuran gambar maksimal 2MB!');
                image = await window.fileToBase64(file);
            }

            // Generate ID Baru (Cari ID tertinggi lalu tambah 1)
            const newId = window.menuItems.length > 0 ? Math.max(...window.menuItems.map(i => i.id)) + 1 : 1;

            const newItem = {
                id: newId, name, price, stock, image, desc, category
            };

            try {
                if(supabase) {
                    const { error } = await supabase.from('menu').insert([newItem]);
                    if (error) throw error;
                    window.toggleAddMenu();
                } else {
                    window.menuItems.push(newItem);
                    window.toggleAddMenu();
                }
                alert('Produk berhasil ditambahkan!');
            } catch (err) {
                alert('Gagal menambah menu baru: ' + err.message);
            }
        };

        // --- FUNGSI RESET & PRINT ---
        window.setAdminFilterDate = function(e) {
            window.adminFilterDate = e.target.value;
            window.render();
        };

        window.printRekap = function() {
            window.print();
        };

        // --- FITUR BARU: Menghapus Satu Pesanan Spesifik ---
        window.deleteOrder = async function(orderId) {
            if (!confirm('Apakah Anda yakin ingin menghapus pesanan ini? Aksi ini tidak bisa dibatalkan.')) return;

            try {
                if (supabase) {
                    // Tambahkan .select() agar kita bisa mendeteksi jika Supabase diam-diam menolak penghapusan
                    const { data, error } = await supabase.from('orders').delete().eq('id', orderId).select();
                    if (error) {
                        console.error("Database error details:", error);
                        throw error;
                    }
                    // Jika data kosong, berarti RLS Policy di Supabase menolak aksi DELETE ini
                    if (!data || data.length === 0) {
                        throw new Error("Akses ditolak oleh Supabase. Pastikan RLS Policy (Enable Delete) untuk tabel 'orders' sudah dibuat.");
                    }
                }

                // Update memori lokal seketika agar layar langsung ter-refresh
                window.orders = window.orders.filter(order => order.id !== orderId);
                window.render();
            } catch (err) {
                console.error("Delete Failed:", err);
                alert('Gagal menghapus pesanan: ' + err.message);
            }
        };

        window.resetOrders = async function() {
            const msg = window.adminFilterDate 
                ? `Apakah Anda yakin ingin menghapus/mereset SEMUA data pesanan pada tanggal ${window.adminFilterDate}?`
                : `Apakah Anda yakin ingin menghapus/mereset SEMUA riwayat pesanan?\n\n(Aksi ini akan menghapus permanen data di server Supabase dan tidak bisa dibatalkan!)`;

            if (!confirm(msg)) return;

            try {
                if (supabase) {
                    if (window.adminFilterDate) {
                        // Cari spesifik ID yang harus dihapus untuk tanggal yang difilter
                        const idsToDelete = window.orders.filter(order => {
                            const tzOffset = new Date(order.created_at).getTimezoneOffset() * 60000;
                            const localDate = new Date(new Date(order.created_at) - tzOffset).toISOString().split('T')[0];
                            return localDate === window.adminFilterDate;
                        }).map(o => o.id);

                        if (idsToDelete.length > 0) {
                            const { data, error } = await supabase.from('orders').delete().in('id', idsToDelete).select();
                            if (error) throw error;
                            if (!data || data.length === 0) throw new Error("Akses ditolak oleh Supabase. Pastikan RLS Policy (Enable Delete) sudah aktif.");
                        }
                    } else {
                        // Menghapus SEMUA riwayat pesanan (Menggunakan kondisi bypass untuk hapus seluruh row)
                        const { data, error } = await supabase.from('orders').delete().neq('id', 'DUMMY_RESET_ID').select();
                        if (error) throw error;
                        if (window.orders.length > 0 && (!data || data.length === 0)) {
                             throw new Error("Akses ditolak oleh Supabase. Pastikan RLS Policy (Enable Delete) sudah aktif.");
                        }
                    }
                }

                // Update memori lokal seketika agar layar langsung ter-refresh
                if (window.adminFilterDate) {
                    window.orders = window.orders.filter(order => {
                        const tzOffset = new Date(order.created_at).getTimezoneOffset() * 60000;
                        const localDate = new Date(new Date(order.created_at) - tzOffset).toISOString().split('T')[0];
                        return localDate !== window.adminFilterDate;
                    });
                } else {
                    window.orders = []; // Bersihkan layar secara total
                }

                alert('Data pesanan berhasil direset!');
                window.render();
            } catch (err) {
                console.error("Reset Failed:", err);
                alert('Gagal mereset data: ' + err.message);
            }
        };

        // --- FUNGSI KERANJANG ---
        window.setPaymentMethod = function(method) { window.paymentMethod = method; window.render(); };
        window.setOrderType = function(type) { window.orderType = type; window.render(); };
        window.setPreorderDate = function(event) { window.preorderDate = event.target.value; window.render(); };

        window.checkIfCartHasPO = function() {
            return window.cart.some(cartItem => {
                const originalMenu = window.menuItems.find(m => m.id === cartItem.id);
                return !originalMenu || originalMenu.stock < cartItem.quantity;
            });
        };

        window.addToCart = function(id) {
            const itemMenu = window.menuItems.find(i => i.id === id);
            if (!itemMenu) return;
            
            const existingItem = window.cart.find(i => i.id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                window.cart.push({ ...itemMenu, quantity: 1 });
            }
            window.render();
        };

        window.removeFromCart = function(id) {
            const index = window.cart.findIndex(i => i.id === id);
            if (index !== -1) {
                if (window.cart[index].quantity === 1) {
                    window.cart.splice(index, 1);
                } else {
                    window.cart[index].quantity -= 1;
                }
            }
            window.render();
        };

        window.handleCheckout = async function() {
            window.buyerAddress = document.getElementById('inputAddress').value;
            window.deliveryTime = document.getElementById('inputTime').value;

            if (window.cart.length === 0) return alert('Keranjang kosong!');
            if (!window.buyerAddress.trim() || !window.deliveryTime) return alert('Mohon lengkapi alamat dan jam pengiriman!');
            
            if (window.orderType === 'instant') {
                for (const cartItem of window.cart) {
                    const itemMenu = window.menuItems.find(i => i.id === cartItem.id);
                    if (itemMenu) {
                        const newStock = Math.max(0, itemMenu.stock - cartItem.quantity);
                        if(supabase) {
                            await supabase.from('menu').update({ stock: newStock }).eq('id', itemMenu.id);
                        } else {
                            itemMenu.stock = newStock; 
                        }
                    }
                }
            }
            
            window.orderDetail = {
                items: [...window.cart],
                total: window.getTotalHarga(),
                id: "MZZ-" + Math.floor(Math.random() * 1000000),
                time: new Date().toLocaleTimeString('id-ID'),
                type: window.orderType,
                date: window.orderType === 'preorder' ? window.preorderDate : 'Hari Ini',
                address: window.buyerAddress,
                deliveryTime: window.deliveryTime
            };

            const dbOrderRecord = {
                id: window.orderDetail.id,
                buyer_name: window.buyerName,
                items: window.orderDetail.items,
                total: window.orderDetail.total,
                type: window.orderDetail.type,
                delivery_date: window.orderDetail.date,
                address: window.orderDetail.address,
                delivery_time: window.orderDetail.deliveryTime,
                payment_method: window.paymentMethod,
                created_at: new Date().toISOString()
            };

            if (supabase) {
                await supabase.from('orders').insert([dbOrderRecord]);
            } else {
                window.orders.unshift(dbOrderRecord); 
            }
            
            window.cart = [];
            window.view = 'success';
            window.render();
        };

            let msg = `Halo Admin Mozzart Coffee, saya ingin memesan:\n\n`;
            msg += `*Order ID:* ${window.orderDetail.id}\n`;
            msg += `*Nama:* ${window.buyerName}\n`;
            msg += `*Alamat Pengiriman:* ${window.orderDetail.address}\n`;
            msg += `*Tipe Pesanan:* ${window.orderDetail.type === 'instant' ? 'Langsung Kirim' : 'Pre-Order (' + window.orderDetail.date + ')'}\n`;
            msg += `*Jam Pengiriman:* ${window.orderDetail.deliveryTime}\n`;
            msg += `*Pembayaran:* ${window.paymentMethod === 'qris' ? 'QRIS' : 'Virtual Account Bank'}\n\n`;
            msg += `*Detail Pesanan:*\n`;
            window.orderDetail.items.forEach(i => {
                msg += `- ${i.quantity}x ${i.name} (${window.formatRupiah(i.price * i.quantity)})\n`;
            });
            msg += `\n*Total Tagihan:* ${window.formatRupiah(window.orderDetail.total)}\n\n`;
            msg += `Terima kasih! Mohon konfirmasinya.`;

            else if (window.view === 'about') mainContent = window.renderAboutView();
            else if (window.view === 'menu') mainContent = window.renderMenuView();
            else if (window.view === 'checkout') mainContent = window.renderCheckoutView();
            else if (window.view === 'success') mainContent = window.renderSuccessView();

            const hideHeader = ['landing', 'loginBuyer', 'loginAdmin', 'admin'].includes(window.view);

            if (hideHeader) {
                appContainer.innerHTML = mainContent;
            } else {
                appContainer.innerHTML = `
                    ${window.renderHeader()}
                    <main class="max-w-6xl mx-auto p-4 md:p-8">
                        ${mainContent}
                    </main>
                    ${window.renderMobileCart()}
                    <footer class="mt-12 py-8 bg-stone-100 border-t border-stone-200 text-center text-stone-400 text-sm no-print">
                        <p>&copy; 2024 Mozzart Coffee. Crafted with Passion.</p>
                    </footer>
                `;
            }
            
            if (window.view === 'admin') {
                const printFooter = document.getElementById('print-footer');
                if (printFooter) {
                    window.addEventListener('beforeprint', () => { printFooter.style.display = 'block'; });
                    window.addEventListener('afterprint', () => { printFooter.style.display = 'none'; });
                }
            }
        }

        // Mulai Render Pertama
        window.render();
    </script>
</body>
</html>
